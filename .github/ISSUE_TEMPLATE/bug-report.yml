name: 🐛 Bug Report
description: Something isn't working correctly
title: "[Bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please include enough detail so we can reproduce the issue.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
      placeholder: "When I run `openclaw-carapace audit`, it..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: "I expected the audit to..."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `openclaw-carapace audit --config ./my-config.json`
        2. See error...
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: Config snippet (optional)
      description: If relevant, paste the relevant part of your openclaw.json (redact secrets!)
      render: json

  - type: input
    id: version
    attributes:
      label: Carapace version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: node_version
    attributes:
      label: Node.js version
      placeholder: "22.0.0"

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
