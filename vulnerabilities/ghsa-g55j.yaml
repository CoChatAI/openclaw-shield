id: ghsa-g55j
type: vulnerability
severity: high
title: "GHSA-g55j-c2v4-pjcg — Unauthenticated local RCE via WebSocket config.apply"
cve: GHSA-g55j-c2v4-pjcg
cvss: 8.4
cwe: "CWE-306"
affected_versions: "< 2026.2.4"
fixed_in: "2026.2.4"
description: >
  Unauthenticated local remote code execution via the WebSocket
  config.apply mechanism. The WebSocket endpoint does not require
  authentication for local connections, allowing any local process or
  malicious web page to send config.apply commands that modify the
  gateway configuration. An attacker can leverage this to disable
  security controls and execute arbitrary commands on the host system
  without any authentication credentials.
recommendation: "Update to OpenClaw v2026.2.4 or later immediately."
references:
  - https://github.com/openclaw/openclaw/security/advisories/GHSA-g55j-c2v4-pjcg
config_path: "gateway.version"
auto_fixable: false
tags: [ghsa, rce, websocket, authentication-bypass, high]
confidence: high
check:
  type: version_compare
  path: gateway.version
  operator: lt
  value: "2026.2.4"
