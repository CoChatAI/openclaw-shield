description: >
  Command injection in Docker execution via PATH environment variable
  manipulation. An attacker can inject arbitrary commands by crafting
  malicious PATH values that are passed unsanitized into Docker container
  execution contexts. This allows execution of attacker-controlled binaries
  instead of the intended system commands, leading to full compromise of
  the container and potential host escape depending on Docker configuration.
recommendation: "Update to OpenClaw v2026.1.29 or later immediately."
