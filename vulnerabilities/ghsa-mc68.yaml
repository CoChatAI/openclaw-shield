title: "GHSA-mc68-q9jw-2h3v — Command injection in Docker execution via PATH manipulation"
cve: GHSA-mc68-q9jw-2h3v
cvss: 8.1
cwe: "CWE-78"
affected_versions: "< 2026.1.29"
