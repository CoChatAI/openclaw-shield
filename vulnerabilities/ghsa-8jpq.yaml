id: ghsa-8jpq
type: vulnerability
severity: medium
title: "GHSA-8jpq-5h99-ff5r — Local file disclosure via Feishu/Lark extension"
cve: GHSA-8jpq-5h99-ff5r
cvss: 6.5
cwe: "CWE-22"
affected_versions: "< 2026.2.15"
fixed_in: "2026.2.15"
description: >
  Local file disclosure via the Feishu (Lark) messaging extension. The
  extension improperly handles file path references, allowing an attacker
  to craft malicious messages that cause the agent to read and transmit
  arbitrary local files. This path traversal vulnerability can expose
  sensitive system files, configuration data, and credentials stored on
  the host running the OpenClaw gateway.
recommendation: "Update to OpenClaw v2026.2.15 or later immediately."
