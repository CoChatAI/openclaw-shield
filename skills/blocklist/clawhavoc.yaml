severity: critical
title: "ClawHavoc malware campaign"
description: >
  Coordinated campaign that planted 335+ malicious skills on ClawHub
  disguised as crypto wallets, YouTube utilities, and workspace integrations.
  Skills deliver Atomic macOS Stealer (AMOS) via base64-encoded scripts
  from glot.io or password-protected ZIPs from GitHub.
recommendation: "Remove this skill immediately and rotate all credentials on the host."
