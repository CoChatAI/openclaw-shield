id: skill.blocklist.known_malicious_authors
type: skill_blocklist
severity: critical
title: "Known malicious skill authors"
description: >
  Skill is published by an author identified in security research as
  distributing malware, infostealers, or backdoored skills. Sources
  include the Snyk ToxicSkills study (2025), Bitdefender research on
  AI coding tool supply-chain attacks (2026), and community incident
  reports. These accounts have been confirmed to distribute credential
  stealers, reverse shells, cryptominers, or ransomware loaders
  disguised as legitimate developer tools.
recommendation: >
  Remove this skill immediately. Run a full credential rotation on any
  machine where the skill was installed. Scan for persistence mechanisms
  (crontabs, launchd plists, systemd services) that the skill may have
  created. Check browser extension directories and ~/.openclaw/skills/
  for unexpected files.
config_path: ""
auto_fixable: false
cwe: "CWE-506"
references:
  - https://snyk.io/blog/toxic-skills-ai-coding-tools/
  - https://www.bitdefender.com/blog/labs/ai-supply-chain-attacks-2026/
  - https://blog.koi.security/clawhavoc-campaign
  - https://blog.barrack.ai/openclaw-security-vulnerabilities-2026/
tags: [skill, malware, blocklist, infostealer, supply-chain]
confidence: high
