id: skill.hardcoded_secrets
type: skill_check
severity: critical
title: "Hardcoded secrets in skill code"
description: >
  Skill source code contains patterns matching known API key, token,
  or credential formats. Hardcoded secrets can be extracted by anyone
  who downloads the skill.
recommendation: "Use environment variables or a secrets manager instead of hardcoding credentials."
config_path: ""
auto_fixable: false
cwe: "CWE-798"
tags: [skill, secrets, credentials]
confidence: high
check:
  type: code_pattern
  patterns:
    - "sk-[a-zA-Z0-9]{20,}"
    - "sk-proj-[a-zA-Z0-9]{20,}"
    - "AKIA[0-9A-Z]{16}"
    - "ghp_[a-zA-Z0-9]{36}"
    - "gho_[a-zA-Z0-9]{36}"
    - "glpat-[a-zA-Z0-9\\-]{20,}"
    - "xoxb-[0-9]{10,}"
    - "xoxp-[0-9]{10,}"
    - "xapp-[0-9]{1,}-[a-zA-Z0-9]{10,}"
    - "AIza[0-9A-Za-z_\\-]{35}"
    - "ya29\\.[0-9A-Za-z_\\-]+"
    - "AZURE_[A-Z_]+=['\"][^'\"]{10,}"
    - "mongodb\\+srv://[^\\s]+"
    - "postgres://[^\\s]+"
    - "mysql://[^\\s]+"
  file_patterns: ["*.ts", "*.js", "*.py", "*.json", "*.env", "*.yaml", "*.yml", "*.sh"]
