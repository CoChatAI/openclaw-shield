label: "Flagged for review"
description: "Routed to you for approval — these may or may not be dangerous"

patterns:
  - pattern: "curl\\s+"
    description: "HTTP request (potential exfiltration)"
  - pattern: "wget\\s+"
    description: "HTTP download"
  - pattern: "pip\\s+install\\s"
    description: "Python package installation"
  - pattern: "npm\\s+install\\s.*-g"
    description: "Global npm package installation"
  - pattern: "git\\s+push\\b"
    description: "Pushing code to remote"
  - pattern: "docker\\s+"
    description: "Container operation"
  - pattern: "sudo\\s+"
    description: "Privilege escalation attempt"
  - pattern: "find\\s+/\\s+"
    description: "Root filesystem enumeration"
  - pattern: "\\benv\\b(?!\\s*=)"
    description: "Environment variable dump"
  - pattern: "\\bprintenv\\b"
    description: "Environment variable dump"
  - pattern: "\\bhistory\\b"
    description: "Command history access"
  - pattern: "\\.openclaw\\b"
    description: "Accessing OpenClaw state"
  - pattern: "ssh\\s+.*@"
    description: "SSH connection to remote host"
