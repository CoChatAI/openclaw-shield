id: custom_provider_external
severity: medium
title: "External model provider detected"
description: >
  A custom model provider points to an external URL. This bypasses any
  LLM-level monitoring and could leak conversation data to an untrusted
  endpoint.
recommendation: >
  Verify this provider is trusted. For hosted gateways, only the managed
  provider should be configured.
config_path: "models.providers.*.baseUrl"
auto_fixable: false
tags:
  - models
  - providers
  - data-exfiltration
check:
  type: url_check
  path: models.providers
  url_field: baseUrl
  trusted_domains:
    - localhost
    - "127.0.0.1"
    - kilo.so
    - kilocode.ai
    - cochat.ai
    - api.cochat.ai
    - api.openai.com
    - api.anthropic.com
    - generativelanguage.googleapis.com
    - api.groq.com
    - api.mistral.ai
    - api.deepseek.com
    - api.together.xyz
    - api.fireworks.ai
    - openrouter.ai
    - api.openrouter.ai
    - bedrock-runtime
    - openai.azure.com
    - aiplatform.googleapis.com
