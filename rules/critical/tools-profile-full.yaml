id: tools.profile_full
severity: critical
title: "All tools unrestricted"
description: >
  Tool profile is 'full' (or unset, which defaults to full) with no deny list.
  Every built-in tool is available to the agent including exec, browser,
  gateway, and cron.
recommendation: >
  Set tools.profile to 'coding' or 'messaging' and deny dangerous tools:
  tools.deny: ['gateway', 'cron'].
config_path: tools.profile
auto_fixable: true
fix:
  tools:
    profile: coding
    deny:
      - gateway
      - cron
tags:
  - tools
  - profile
  - attack-surface
mitigates_cwes: ["CWE-78", "CWE-22", "CWE-918"]
mitigates_label: "Unrestricted tool access enabling injection chains"
check:
  type: cross_field
  conditions:
    - path: tools.profile
      op: in
      value:
        - null
        - full
    - path: tools.deny
      op: falsy
